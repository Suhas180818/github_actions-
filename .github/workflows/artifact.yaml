name: Artifacts-storage 

on: 
  workflow_dispatch:

jobs: 
    output_building: 
       runs-on: ubuntu:latest 

       steps: 
         - name: creating and appending the file 
           run: |
             mkdir build 
             echo"This is the test file for artifact storage" > build/sample.txt 

         - name: uploading the file to artifactory 
           uses: actions/upload-artifact@v7 
           with: 
             name: build-output 
             path: build/ 
             
    downoading the artifactory: 
      
      needs: output_building
      
      runs-on: ubutnu-latest 
      
      steps: 
        - name: downloading the files 
          uses: actions/download-artifact@v8
          with: 
            name: build-output 
            path: ./build


        - name: file_Checking
          run: | 
             ls -lrt  
             cat ./build/sample.txt 